<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Math Cross</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="select-wrap">
      <label>Formato</label>
      <select id="formatSelect"></select>
    </div>
    <div class="select-wrap">
      <label>Dificultad</label>
      <select id="difficultySelect">
        <option value="0">Fácil</option>
        <option value="1" selected>Medio</option>
        <option value="2">Difícil</option>
      </select>
    </div>
    <button id="newBtn" class="primary small">Nuevo</button>
    <div class="spacer"></div>
    <button id="pauseBtn" class="circle small">⏸</button>
    <span id="timer">00:00</span>
  </header>

  <section id="message" class="message">Arrastrá un número a una casilla vacía.</section>
  <section id="board" class="board"></section>

  <section class="tray">
    <div class="tray-title">
      <h3>Números disponibles</h3>
      <small id="availableCount"></small>
    </div>
    <div id="numbers" class="numbers"></div>
  </section>

  <footer class="bottom">
    <button id="checkBtn" class="primary">Comprobar</button>
    <button id="hintBtn" class="hint">💡 <small id="hintsLeft">x2</small></button>
  </footer>
</main>

<div id="dragGhost" class="drag-ghost hidden"></div>

<div id="modal" class="modal hidden">
  <div class="modal-card">
    <h2 id="modalTitle">Pausa</h2>
    <p id="modalText">Juego pausado</p>
    <button id="modalBtn">Continuar</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
